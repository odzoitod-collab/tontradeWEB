<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    
    <!-- Viewport: cover, keyboard resizes content to avoid layout jumps -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    
    <!-- PWA мета-теги -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TonTrader" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="display-mode" content="fullscreen" />
    <meta name="screen-orientation" content="portrait" />
    
    <!-- Описание приложения -->
    <meta name="description" content="Professional cryptocurrency trading platform" />
    <meta name="keywords" content="crypto, trading, bitcoin, ethereum, ton" />
    <meta name="author" content="TonTrader" />
    
    <!-- Telegram WebApp мета-теги -->
    <meta name="telegram-web-app-theme-color" content="#000000" />
    <meta name="telegram-web-app-background-color" content="#000000" />
    <meta name="telegram-web-app-header-color" content="#000000" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Иконки для iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-128x128.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-72x72.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-72x72.png" />
    
    <!-- Splash screens для iOS -->
    <link rel="apple-touch-startup-image" href="/icon-512x512.png" />
    
    <title>TonTrader - Crypto Trading</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Base: full viewport, keyboard-safe (dvh), system font */
      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
      }
      html, body {
        height: 100%;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0b;
        color: #e5e5e7;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 16px;
        line-height: 1.4;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      #root {
        height: 100%;
        min-height: 100dvh;
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      
      /* Убираем скроллбары */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Поддержка safe area для iPhone */
      .safe-area-top {
        padding-top: env(safe-area-inset-top, 0px);
      }
      
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      
      .safe-area-left {
        padding-left: env(safe-area-inset-left, 0px);
      }
      
      .safe-area-right {
        padding-right: env(safe-area-inset-right, 0px);
      }
      
      /* Отключаем зум и выделение */
      * {
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
      }
      
      input, textarea {
        -webkit-user-select: text;
      }
      
      /* Умная блокировка pull-to-refresh (только для body) */
      body {
        overscroll-behavior-y: contain;
        overscroll-behavior-x: none;
      }
      
      /* Скролл контейнеры: обязательно разрешаем вертикальный скролл */
      .overflow-y-scroll, .overflow-y-auto {
        overscroll-behavior-y: auto;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }
      
      button, a {
        touch-action: manipulation;
      }
      
      .glass-panel {
        background: rgba(30, 30, 35, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px) rotateY(0deg); }
        25% { transform: translateY(-10px) rotateY(5deg); }
        50% { transform: translateY(-20px) rotateY(0deg); }
        75% { transform: translateY(-10px) rotateY(-5deg); }
      }
      
      @keyframes tonSpin {
        0% { transform: perspective(1000px) rotateY(0deg); }
        100% { transform: perspective(1000px) rotateY(360deg); }
      }
      
      @keyframes tonFloat {
        0%, 100% { 
          transform: translateY(0px) scale(1); 
          filter: drop-shadow(0 20px 30px rgba(0, 152, 234, 0.4));
        }
        50% { 
          transform: translateY(-15px) scale(1.02); 
          filter: drop-shadow(0 30px 40px rgba(0, 152, 234, 0.6));
        }
      }
      
      @keyframes glowPulse {
        0%, 100% { 
          opacity: 0.4; 
          transform: scale(1);
        }
        50% { 
          opacity: 0.7; 
          transform: scale(1.1);
        }
      }
      
      .ton-logo-container {
        animation: tonFloat 3s ease-in-out infinite;
      }
      
      .ton-glow {
        animation: glowPulse 4s ease-in-out infinite;
        opacity: 0.5;
      }
      
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      @keyframes slideUpFromBottom {
        from { 
          transform: translate(-50%, 100%); 
          opacity: 0; 
        }
        to { 
          transform: translate(-50%, 0); 
          opacity: 1; 
        }
      }
      
      @keyframes scaleIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(0, 152, 234, 0.25); }
        50% { box-shadow: 0 0 12px 3px rgba(0, 152, 234, 0.15); }
      }
      /* Keyboard open: keep layout stable (resizes-content in viewport) */
      .keyboard-open .fixed.bottom-0 { bottom: 0; }
      
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.89.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker регистрация -->
    <script>
      // Регистрация Service Worker для PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registered:', registration.scope);
              
              // Проверка обновлений каждые 60 секунд
              setInterval(() => {
                registration.update();
              }, 60000);
            })
            .catch((error) => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      }
      
      // Не блокируем touchmove — скролл идёт внутри #root, иначе не листается
      
      // Отключаем контекстное меню (долгое нажатие)
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
      });
      
      // Отключаем двойной тап для зума (более мягкая версия)
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
      
      // Visual viewport: optional class when keyboard is open (for tweaks)
      if (window.visualViewport) {
        let lastHeight = window.visualViewport.height;
        window.visualViewport.addEventListener('resize', () => {
          const h = window.visualViewport.height;
          document.documentElement.classList.toggle('keyboard-open', h < lastHeight * 0.85);
        });
      }
      
      // Обработка установки PWA
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('💾 PWA install prompt ready');
      });
      
      // Функция для показа промпта установки
      window.showInstallPrompt = () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('✅ User accepted PWA install');
            }
            deferredPrompt = null;
          });
        }
      };
      
      // Отслеживание установки PWA
      window.addEventListener('appinstalled', () => {
        console.log('✅ PWA installed successfully');
        deferredPrompt = null;
      });
      
      // Проверка standalone режима
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log('📱 Running in standalone mode (PWA)');
        document.body.classList.add('standalone-mode');
      }
    </script>
    
  <script type="module" src="/index.tsx"></script>
</body>
</html>
